# docs/guide 표준 준수. OM(shopeasy-api)과 동일 도메인·세션·PostgreSQL 전제(백오피스 AM).
# 환경별 설정은 application-{profile}.yml 에서 오버라이드.
# DB 계정·비밀번호는 Git에 넣지 않는다 — 환경 변수 또는 미추적 application-local.yml 사용.
spring:
  application:
    name: am-backoffice
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.am.backoffice
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

server:
  port: 8080
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/plain
  servlet:
    context-path: /
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.am.backoffice: INFO
    # OM 도메인 코드를 이 모듈로 이전할 때 동일 로그 레벨 유지
    com.shopeasy: INFO
